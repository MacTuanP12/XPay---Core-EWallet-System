spring:
  application:
    name: XPay Core System


  datasource:
    url: jdbc:mysql://localhost:3306/xpay_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # Dùng 'update' trong quá trình Dev để tự động tạo bảng từ Entity.
      # Khi lên Production bắt buộc phải đổi thành 'validate' hoặc 'none'.
      ddl-auto: update
    show-sql: true # Hiển thị câu lệnh SQL trên console để dễ debug
    properties:
      hibernate:
        format_sql: true # Format SQL cho dễ nhìn
        dialect: org.hibernate.dialect.MySQLDialect

# Cấu hình JWT Custom cho XPay
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000 # 1 ngày (tính bằng milliseconds)

server:
  port: 8080