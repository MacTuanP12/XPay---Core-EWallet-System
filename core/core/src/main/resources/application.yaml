spring:
  application:
    name: XPay Core System

  profiles:
    active: local



  datasource:
    url: jdbc:mysql://localhost:3306/xpay_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:

      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect


application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000

server:
  port: 8080